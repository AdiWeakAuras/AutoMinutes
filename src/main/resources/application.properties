spring.application.name=backend

# Default profile: H2 in-memory DB, used for local dev, tests and CI.
# 'sa' with no password is H2's own default and isn't a real secret,
# so it's safe to keep here. For real deployments, activate the
# 'postgres' profile (see application-postgres.properties) instead
# of adding real credentials to this file.

spring.datasource.url=jdbc:h2:mem:autominutes;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# LLM Integration (Ollama, local)
llm.base-url=http://localhost:11434
llm.model=llama3.2
llm.timeout-seconds=30