# Postgres profile.
# Activate with: --spring.profiles.active=postgres
# (or SPRING_PROFILES_ACTIVE=postgres as an env var)
#
# DB_URL / DB_USERNAME / DB_PASSWORD have NO defaults on purpose:
# if they're not set, startup fails fast with a clear error instead
# of silently falling back to some hardcoded value that could end up
# committed to git.

spring.datasource.url=${DB_URL}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.h2.console.enabled=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# LLM Integration (Ollama, local)
llm.base-url=${LLM_BASE_URL:http://localhost:11434}
llm.model=${LLM_MODEL:llama3.2}
llm.timeout-seconds=${LLM_TIMEOUT_SECONDS:30}