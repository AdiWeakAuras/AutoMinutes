name: AutoMinutes CI Pipeline

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Compile Application
        run: ./gradlew assemble

      - name: Run Test Suite
        env:
          SPRING_PROFILES_ACTIVE: h2
        run: ./gradlew test

      - name: Generate Coverage Report (JaCoCo)
        run: ./gradlew jacocoTestReport

      - name: Upload Production JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: autominutes-backend-jar
          path: build/libs/*.jar
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: build/reports/tests/
          if-no-files-found: ignore

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: build/reports/jacoco/test/html/
          if-no-files-found: ignore

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./auto-minutes-frontend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './auto-minutes-frontend/package-lock.json'

      - name: Install Dependencies
        run: npm install

      - name: Build Angular App
        run: npm run build

      - name: Run Vitest Suite
        run: npm test -- --watch=false

      - name: Upload Production Web Artifact
        uses: actions/upload-artifact@v4
        with:
          name: autominutes-frontend-build
          path: auto-minutes-frontend/dist/
          retention-days: 7
          if-no-files-found: ignore
